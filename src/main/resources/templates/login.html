<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore | Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <!-- Logo / Brand -->
        <div class="login-brand">
            <div class="brand-icon">🎮</div>
            <h1 class="brand-name">GameStore</h1>
            <p class="brand-tagline">Tu tienda de videojuegos favorita</p>
        </div>

        <!-- Card de login -->
        <div class="login-card">
            <h2 class="login-title">Bienvenido de vuelta</h2>
            <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

            <!-- Mensajes de error / éxito -->
            <div th:if="${error}" class="alert alert-error">
                <span>⚠️</span>
                <span th:text="${error}"></span>
            </div>
            <div th:if="${mensaje}" class="alert alert-success">
                <span>✅</span>
                <span th:text="${mensaje}"></span>
            </div>

            <!-- Formulario -->
            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Usuario</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-input"
                               placeholder="Ingresa tu usuario"
                               required
                               autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-input"
                               placeholder="Ingresa tu contraseña"
                               required
                               autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Iniciar Sesión
                </button>

                <div class="login-footer">
                    <p>¿No tienes cuenta? <a th:href="@{/registro}" class="link-primary">Regístrate aquí</a></p>
                </div>
            </form>

            <!-- Usuarios de prueba -->
            <div class="demo-accounts">
                <p class="demo-title">🎯 Cuentas de prueba:</p>
                <div class="demo-grid">
                    <div class="demo-item" onclick="fillLogin('admin','admin123')">
                        <span class="demo-badge">Admin</span>
                        <span class="demo-creds">admin / admin123</span>
                    </div>
                    <div class="demo-item" onclick="fillLogin('jose','jose123')">
                        <span class="demo-badge">User</span>
                        <span class="demo-creds">jose / jose123</span>
                    </div>
                    <div class="demo-item" onclick="fillLogin('gamer','gamer123')">
                        <span class="demo-badge">User</span>
                        <span class="demo-creds">gamer / gamer123</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fillLogin(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
        }
    </script>
</body>
</html>
